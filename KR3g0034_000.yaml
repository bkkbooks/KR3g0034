body:
  text: 提要玉照定真經一卷術數類五命書相書之屬臣等謹案玉照定真經一卷舊本題晉郭璞撰張顒註考晉書璞傳不言璞有此書隋志唐志宋志以及諸家書目皆不著録惟葉盛菉竹堂書目載有此書一冊亦不著撰人盖晚出依託之本張顒亦不知何許人勘驗書中多涉江南方言疑書與注文均出自張顒一人之手而假名於璞以行術家影附往往如此不足辨也其書世罕傳本僅元明人星命書偶一引之今檢永樂大典所載首尾備具猶為完帙雖文句不甚雅馴而大㫖頗簡潔明晰猶有珞琭子及李虚中命書遺意所言吉凶應驗切近中理亦多有可採如論年儀月儀六害三竒三交四象之類尤多所闡發惟推及外親女婿以曲説穿鑿不免牽强附㑹耳盖舊本相𫝊要有所受究非後來杜撰者所能及故録而存之備星命家之一種焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:35019779f0cb35c794bab656236db6a011635293daf3901dc3e6b95ebe2599d6
